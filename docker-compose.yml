services:
  attendance:
    build: .
    container_name: greythr-attendance
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
      # Always headless inside Docker
      - HEADLESS=true
    volumes:
      # Mount a logs directory — Docker creates it automatically
      - ./logs:/app/logs
    # Uncomment to override the default cron schedule with a one-off test:
    # command: ["node", "index.js"]
